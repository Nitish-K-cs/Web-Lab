<!DOCTYPE html>
<html lang="en">
<head>
  <title>Links</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #EBF5EB; 
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h2 {
      color: #333;
      font-size: 32px;
      margin-bottom: 30px;
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 12px 25px;
      font-size: 18px;
      text-decoration: none;
      color: white;
      background-color: #7fc4b2; /* button color */
      border-radius: 8px;
      transition: 0.3s;
    }

    a:hover {
      background-color: #5fae99;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <h2>Visit These<br>Sites</h2>

  <ul>
    <li>
      <a href="https://jssstuniv.in/#/" target="right">JSSSTU</a>
    </li>
    <li>
      <a href="https://en.wikipedia.org/wiki/Computer_science" target="right">CSE</a>
    </li>
    <li>
      <a href="https://en.wikipedia.org/" target="right">Wikipedia</a>
    </li>
  </ul>
</body>
</html>
