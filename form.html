<!DOCTYPE html>
<html lang="en">
<head>
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <title>Student Feedback</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #D5F2F2;
        }

        .container {
            margin: 50px auto;
            width: 400px;
            padding: 30px;
            background-color: #f5f5f5;
            border-radius: 10px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            text-align: left;
        }

        h1 {
            text-align: center;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
        }

        input[type="submit"] {
            margin-top: 15px;
            background-color: rgb(204, 222, 216);
            border: none;
            cursor: pointer;
        }

        .footer {
            margin-top: 20px;
            overflow: hidden;
            white-space: nowrap;
        }


        @keyframes scroll {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }
    </style>
</head>

<body>

<div class="container">
    <h1><i class="ri-graduation-cap-line"></i> Student Feedback</h1>

    <form>
        <label for="fname">Full Name:</label>
        <input type="text" id="fname" name="fullname" placeholder="Your name" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="emailid" placeholder="Your E-mail id" required>

        <label for="usn">USN:</label>
        <input type="text" id="usn" name="usn" placeholder="Your USN">

        <label for="sem">Select semester:</label>
        <select id="sem" name="sem">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
        </select>
        
        <label>Gender:</label>
        <input type="radio" name="branch" value="male"> Male
        <input type="radio" name="branch" value="female"> Female 
        <input type="radio" name="branch" value="others"> Others

        <label>Branch:</label>
        <input type="radio" name="branch" value="CSE"> CSE<br>
        <input type="radio" name="branch" value="IS"> IS<br>
        <input type="radio" name="branch" value="EC"> EC<br>
        <input type="radio" name="branch" value="NCB"> NCB<br>

        <label for="feedback">Feedback:</label>
        <textarea id="feedback" rows="6" name="feedback" placeholder="Your Feedback and Suggestions"></textarea>

        <label>
            <input type="checkbox" name="req"> Send me a copy of feedback
        </label>

        <input type="submit" value="Submit">
    </form>
</div>

<div class="footer">
        <marquee direction = "left">&copy; JSS Science and Technology University </marquee>
</div>

</body>
</html>
